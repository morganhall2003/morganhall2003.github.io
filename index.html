<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Moveset Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Pokemon Moveset Game</h1>
    </header>
    
    <main>
        <section id="container">
            <button id="randomBtn" class="btn-primary">Get Random Pokemon</button>
            <button id="giveUpBtn" class="btn-primary">Give Up</button>
            
            <div id="pokemonCard" class="pokemon-card" style="display: none;">
                <div id="pokemonInfo">
                    <h2 id="pokemonName"></h2>
                    <img id="pokemonImage" alt="Pokemon">
                    <p><strong>Types:</strong> <span id="pokemonTypes"></span></p>
                </div>
                
                <div id="movesInfo">
                    <h3>Moveset - Guess the Moves!</h3>
                    <button id="hintBtn" class="btn-primary">Show Hints</button>
                    <div class="guess-container">
                        <input type="text" id="guessInput" placeholder="Type a move name to reveal it..." class="guess-input">
                        <div id="suggestionsList" class="suggestions-list"></div>
                        <h3 id="guessOutcome"></h3>
                    </div>
                    <div class="guess-outcome">
                    </div>
                    <div id="movesList"></div>
                </div>
            </div>
            
            <div id="loading" class="loading" style="display: none;">
                <p>Loading Pokemon...</p>
            </div>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2026 Pokemon Moveset Game</p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
